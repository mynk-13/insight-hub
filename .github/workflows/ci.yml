name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    name: Build & Bundle Check
    runs-on: ubuntu-latest
    env:
      # These values are build-time-only placeholders. They never connect to real services.
      # Prisma generate + Next.js build require env vars to be defined, not valid.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DATABASE_URL_UNPOOLED: postgresql://ci:ci@localhost:5432/ci
      AUTH_SECRET: ci-build-only-32-char-placeholder-xx
      NEXT_PUBLIC_APP_URL: https://localhost:3000
      UPSTASH_REDIS_REST_URL: https://ci-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-token-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - name: Check bundle sizes
        run: |
          MARKETING_SIZE=$(find .next/static/chunks -name "*.js" | xargs wc -c 2>/dev/null | tail -1 | awk '{print $1}' || echo 0)
          echo "Total JS bundle bytes: $MARKETING_SIZE"
